                    - generic [ref=e160]:
                      - heading "Efekt" [level=5] [ref=e161]
                      - paragraph [ref=e162]: W wyniku realizacji projektu pozyskano i przygotowano dużą ilość specjalistycznych materiałów medycznych, w tym kilkaset opatrunków hemostatycznych oraz 50 profesjonalnie wyposażonych apteczek pierwszej pomocy. Inicjatywa połączyła działania organizacji pozarządowej, biznesu i setek osób prywatnych, pokazując, że skuteczna koordynacja i współpraca mogą w krótkim czasie przełożyć się na realną pomoc dla osób znajdujących się w strefie działań wojennych.
