                    - paragraph [ref=e150]: Pomoc dla Ukrainy to inicjatywa humanitarna zrealizowana w ramach Fundacji ARKUN, której byłem współpomysłodawcą i współorganizatorem. Projekt powstał jako szybka odpowiedź na potrzeby osób poszkodowanych przez wojnę i koncentrował się na pozyskaniu specjalistycznych materiałów medycznych dla szpitala w Kijowie oraz Ukraińskich Sił Zbrojnych. Dzięki zaangażowaniu wolontariuszy, partnerów biznesowych i darczyńców udało się stworzyć sprawnie działający łańcuch pomocy - od zbiórki środków, przez negocjacje z producentami, aż po przygotowanie i wysyłkę transportu.
