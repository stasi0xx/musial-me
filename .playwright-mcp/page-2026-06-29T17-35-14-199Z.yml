                      - paragraph [ref=e156]: Głównym celem inicjatywy było dostarczenie wysokiej jakości wyposażenia medycznego tam, gdzie było ono najbardziej potrzebne. Projekt zakładał efektywne wykorzystanie zebranych środków poprzez bezpośrednią współpracę z producentami i dystrybutorami, co pozwoliło zwiększyć skalę pomocy oraz pozyskać specjalistyczne produkty trudno dostępne na rynku.
